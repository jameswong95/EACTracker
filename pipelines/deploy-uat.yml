trigger: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: imageTag
    type: string

stages:
  - stage: DeployUat
    jobs:
      - deployment: Deploy
        environment: eactracker-uat
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: AzureCLI@2
                  displayName: Deploy to UAT VM
                  inputs:
                    azureSubscription: sc-eactracker-uat
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      echo "Deploy image tag ${{ parameters.imageTag }} to UAT"
                      echo "Use az vm run-command or SSH over approved JIT path to run:"
                      echo "/opt/eactracker/deploy/scripts/deploy-compose.sh uat ${{ parameters.imageTag }} ${{ parameters.imageTag }}"

