<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#2F6BBD"/>
  <!-- EAC bar chart: 3 bars rising left to right -->
  <rect x="5"  y="18" width="5" height="9"  rx="1" fill="white" opacity="0.6"/>
  <rect x="13" y="13" width="5" height="14" rx="1" fill="white" opacity="0.8"/>
  <rect x="21" y="8"  width="5" height="19" rx="1" fill="white"/>
  <!-- Trend line across the tops -->
  <polyline points="7.5,18 15.5,13 23.5,8" stroke="#ED7D31" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at end of trend -->
  <circle cx="23.5" cy="8" r="2" fill="#ED7D31"/>
</svg>
