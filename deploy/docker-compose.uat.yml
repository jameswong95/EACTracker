services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      AUTH_PROXY_SECRET: ${AUTH_PROXY_SECRET:?AUTH_PROXY_SECRET is required}
    volumes:
      - ./nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
      - oauth2-proxy
    networks: [app]

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --oidc-issuer-url=${OAUTH2_PROXY_OIDC_ISSUER_URL:?OAUTH2_PROXY_OIDC_ISSUER_URL is required}
      - --client-id=${OAUTH2_PROXY_CLIENT_ID:?OAUTH2_PROXY_CLIENT_ID is required}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET:?OAUTH2_PROXY_CLIENT_SECRET is required}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET:?OAUTH2_PROXY_COOKIE_SECRET is required}
      - --redirect-url=${OAUTH2_PROXY_REDIRECT_URL:?OAUTH2_PROXY_REDIRECT_URL is required}
      - --email-domain=*
      - --scope=openid profile email
      - --set-xauthrequest=true
      - --user-id-claim=preferred_username
      - --oidc-groups-claim=roles
      - --pass-access-token=false
      - --pass-authorization-header=false
      - --reverse-proxy=true
      - --cookie-secure=true
      - --cookie-samesite=lax
      - --cookie-domain=${OAUTH2_PROXY_COOKIE_DOMAIN:-pfms-uat.agilops.work}
      - --cookie-name=_pfms_uat_oauth2_proxy
    networks: [app]

  frontend:
    image: ${ACR_LOGIN_SERVER:?ACR_LOGIN_SERVER is required}/eactracker-frontend:${FRONTEND_IMAGE_TAG:?FRONTEND_IMAGE_TAG is required}
    restart: unless-stopped
    networks: [app]

  backend:
    image: ${ACR_LOGIN_SERVER:?ACR_LOGIN_SERVER is required}/eactracker-backend:${BACKEND_IMAGE_TAG:?BACKEND_IMAGE_TAG is required}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_ENV: uat
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DATABASE_SSL: ${DATABASE_SSL:-1}
      AUTH_MODE: proxy
      AUTH_PROXY_SECRET: ${AUTH_PROXY_SECRET:?AUTH_PROXY_SECRET is required}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-wong.james@stengg.com}
      BOOTSTRAP_ADMIN_ROLE: Admin
      TRUST_PROXY: "1"
      CORS_ORIGIN: ""
      LOG_SQL: "0"
      RPS_ALLOCATIONS_BASE_URL: ${RPS_ALLOCATIONS_BASE_URL:-https://rps.agilops.work/api/extract/projects/wbs}
      RPS_RESOURCES_URL: ${RPS_RESOURCES_URL:-https://rps.agilops.work/api/extract/resources}
      RPS_REQUEST_TIMEOUT_MS: ${RPS_REQUEST_TIMEOUT_MS:-15000}
      RPS_RESOURCE_DEFAULT_GRADE: ${RPS_RESOURCE_DEFAULT_GRADE:-E2}
      RPS_API_KEY: ${RPS_API_KEY:-}
      RPS_API_TOKEN: ${RPS_API_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [app]

networks:
  app:
    driver: bridge
